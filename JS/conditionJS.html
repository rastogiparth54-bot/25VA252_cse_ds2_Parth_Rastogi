<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional statement in JS</title>
</head>
<body>
    <script>
        //if condition

        let age=23;
        if(age>=18){
            console.log("valid age for vote casting !");
        }

        //if .. else

        let myage=15;
        if(myage<18){
            console.log("wait for next year");
        }
        else{
            console.log("you are elegible for voting!");
        }

        //switch case

        let grade="A";
        switch(grade){
            case'A':result="First Division";
            break;
            case'B':result="Second Division";
            break;
            case'C':result="Third Division";
            break;
            default:result="You are Fail";
        }
        console.log(result);

        //else.. if

        let marks=prompt("enter the percentage here");

        if(marks>=90){
            console.log("First division marks");
        }
        else if(marks>=70 && marks<90){
            console.log("Second division mark");
        }
        else if(marks>=60 && marks<70){
            console.log("Third division marks");
        }
        else{
            console.log("fail");
        }
    </script>
    
</body>
</html>
