<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in JS</title>
</head>
<body>
    <script>
        //Function is a reusable block of code designed to perform a specific task

        //normal function without para

         function demo(text){
          console.log("Hello " + text)

         }
        demo();

        //normal function with para
        function demo1(text){
            console.log("Hello " + text)

        }
        demo1("React");

        // function with default parameter

        function add(a,b=10){

            console.log("addition of two number is " + (a+b));
        }
        add(3,3);

        // anonymous function

        let cal=function(){
            var num1=5;
            var num2=10;
            var res=num1*num2;
            console.log("Multiplication of two number " + res );

        }
        cal();

        // arrow function 

        let div=(x,y)=>{
            var num1=x;
            var num2=y;
            var res=x/y;
            console.log("Division of two number is " + res )
        }
        div(12,3);

        // arrow function with single line statement

        let msg=()=>console.log("Hello ABES");
        msg();

        //callback function:

        function sub(callback){
            var num1=10;
            var num2=20;
            var res=num1-num2;
            callback(res);
        }
        function displayRes(res){
            console.log("Result is " + res);
        }
        sub(displayRes)

        //callback usinh set timeout API

        function msg1(){
            console.log("Hello Friend");
        }
        setTimeout(msg1,5000)




    </script>
    
</body>
</html>
