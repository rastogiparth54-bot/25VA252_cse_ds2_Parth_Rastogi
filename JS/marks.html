<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>result</title>
</head>
<body>

    
    <script>
        let marks=[90,90,98,95,90,96];
        let s=0;
        for(x of marks){
            s+=x;
        }
        let avg=s/(marks.length);

         if(avg>=90){
            console.log("First division marks");
        }
        else if(avg>=70 && avg<90){
            console.log("Second division mark");
        }
        else if(avg>=60 && avg<70){
            console.log("Third division marks");
        }
        else{
            console.log("fail");
        }

    </script>
    <!--of work on iteration-->
</body>
</html>
